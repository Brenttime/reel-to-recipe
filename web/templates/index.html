<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reel Cookbook</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header" id="appHeader">
            <div class="header-bar">
                <div class="header-left">
                    <div class="header-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                            <path d="M9 7h6M9 11h4"/>
                        </svg>
                    </div>
                    <div class="header-titles">
                        <h1 class="header-title">Reel Cookbook</h1>
                        <p class="header-subtitle">Recipes from reels</p>
                    </div>
                </div>
                <div class="header-right">
                    <span class="recipe-count" id="recipeCount"></span>
                    <button class="header-btn cart-toggle" id="cartToggle" title="Shopping List">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <path d="M16 10a4 4 0 01-8 0"/>
                        </svg>
                        <span class="cart-badge" id="cartBadge" style="display:none;">0</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Search -->
        <div class="search-container">
            <div class="glass-search">
                <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search recipes, creators, ingredients..." autocomplete="off">
                <button id="clearSearch" class="clear-btn" style="display:none;">
                    <svg viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                    </svg>
                </button>
            </div>
            <div class="filter-chips" id="filterChips"></div>
        </div>

        <!-- Recipe Grid -->
        <main class="recipe-grid" id="recipeGrid"></main>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-glass">
                <svg viewBox="0 0 64 64" fill="none">
                    <rect x="8" y="12" width="48" height="40" rx="8" stroke="currentColor" stroke-width="2" opacity="0.4"/>
                    <path d="M20 28h24M20 36h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
                </svg>
                <p>No recipes found</p>
                <span>Try a different search or add recipes via the API</span>
            </div>
        </div>

        <!-- Recipe Detail Modal -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="glass-modal" id="recipeModal">
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                </button>
                <div class="modal-content" id="modalContent"></div>
            </div>
        </div>

        <!-- Shopping List Panel -->
        <div class="shopping-overlay" id="shoppingOverlay">
            <div class="glass-modal shopping-panel">
                <button class="modal-close" id="shoppingClose">
                    <svg viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                </button>
                <div id="shoppingContent"></div>
            </div>
        </div>

        <!-- Cook Mode Overlay -->
        <div class="cook-mode" id="cookMode">
            <div class="cook-mode-content" id="cookModeContent"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
