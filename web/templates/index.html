<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlyPans</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="header-content">
                <div class="logo">
                    <h1>OnlyPans</h1>
                    <span class="logo-divider">—</span>
                    <span class="logo-tagline">Reels to Ingredients</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-action-btn" id="addReelBtn" title="Add a reel">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
                </button>
                <button class="header-action-btn" id="cartToggle" title="Shopping List">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/></svg>
                    <span class="cart-badge" id="cartBadge" style="display:none;">0</span>
                </button>
            </div>
        </header>

        <!-- Spotlight-style convert overlay -->
        <div class="spotlight-overlay" id="spotlightOverlay">
            <div class="spotlight-bar" id="spotlightBar">
                <svg class="spotlight-icon" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5zm-5 5a2 2 0 012.828 0 1 1 0 101.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 105.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5a2 2 0 11-2.828-2.828l3-3z" clip-rule="evenodd"/>
                </svg>
                <input type="text" id="convertInput" placeholder="Paste an Instagram or TikTok reel URL…" autocomplete="off" spellcheck="false">
                <div class="spotlight-right">
                    <span class="convert-spinner" id="convertSpinner" style="display:none;"></span>
                    <kbd class="spotlight-hint" id="spotlightHint">esc</kbd>
                </div>
            </div>
            <div class="spotlight-status" id="convertStatus" style="display:none;"></div>
        </div>

        <!-- Search -->
        <div class="search-container">
            <div class="glass-search">
                <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search recipes, creators, ingredients..." autocomplete="off">
                <button id="clearSearch" class="clear-btn" style="display:none;">
                    <svg viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                    </svg>
                </button>
            </div>
            <div class="filter-chips" id="filterChips"></div>
        </div>

        <!-- Recipe Grid -->
        <main class="recipe-grid" id="recipeGrid"></main>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-glass">
                <svg viewBox="0 0 64 64" fill="none">
                    <rect x="8" y="12" width="48" height="40" rx="8" stroke="currentColor" stroke-width="2" opacity="0.4"/>
                    <path d="M20 28h24M20 36h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
                </svg>
                <p>No recipes found</p>
                <span>Try a different search or add recipes via the API</span>
            </div>
        </div>

        <!-- Recipe Detail Modal -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="glass-modal" id="recipeModal">
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                </button>
                <div class="modal-content" id="modalContent"></div>
            </div>
        </div>

        <!-- Shopping List Panel -->
        <div class="shopping-overlay" id="shoppingOverlay">
            <div class="glass-modal shopping-panel">
                <button class="modal-close" id="shoppingClose">
                    <svg viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                </button>
                <div id="shoppingContent"></div>
            </div>
        </div>

        <!-- Cook Mode Overlay -->
        <div class="cook-mode" id="cookMode">
            <div class="cook-mode-content" id="cookModeContent"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
