<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OnlyPans</title>
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OnlyPans">
    <meta name="theme-color" content="#FF9500">
    <link rel="stylesheet" href="/static/style.css?v=36">
    <link rel="stylesheet" href="/static/meal-plan.css?v=12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="convert-queue-bar" id="convertQueueBar" style="display:none;">
        <div class="queue-bar-island-glow"></div>
        <div class="queue-bar-content">
            <div class="queue-bar-inner">
                <div class="queue-bar-progress"></div>
            </div>
            <span class="queue-bar-text" id="queueBarText"></span>
        </div>
    </div>
    <div class="bg-mesh"></div>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="header-left">
                <div class="user-profile" id="userProfile" style="display:none;">
                    <button class="user-avatar-btn" id="userAvatarBtn">
                        <img class="user-avatar" id="userAvatar" alt="Profile" />
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                        <div class="dropdown-user-info">
                            <img class="dropdown-avatar" id="dropdownAvatar" alt="Profile" />
                            <div class="dropdown-name" id="dropdownName"></div>
                            <div class="dropdown-username" id="dropdownUsername"></div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-theme-section">
                            <div class="dropdown-theme-label">Appearance</div>
                            <div class="theme-toggle-group" id="themeToggleGroup">
                                <button class="theme-toggle-btn" data-theme="light" title="Light">
                                    <span class="theme-icon">☀️</span>
                                </button>
                                <button class="theme-toggle-btn" data-theme="dark" title="Dark">
                                    <span class="theme-icon">🌙</span>
                                </button>
                                <button class="theme-toggle-btn active" data-theme="system" title="System">
                                    <span class="theme-icon">💻</span>
                                </button>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="/auth/logout" class="dropdown-item dropdown-logout">
                            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 001 1h12a1 1 0 001-1V4a1 1 0 00-1-1H3zm7.707 3.293a1 1 0 010 1.414L9.414 9H17a1 1 0 110 2H9.414l1.293 1.293a1 1 0 01-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                            Sign Out
                        </a>
                    </div>
                </div>
                <button class="header-action-btn meal-plan-btn" id="mealPlanBtn" title="Meal Plan">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="5"/><line x1="16" y1="2" x2="16" y2="5"/><line x1="14" y1="12" x2="14" y2="19"/><path d="M10 12v3c0 1 .5 1.5 1 1.5s1-.5 1-1.5v-3"/><path d="M10 12c0-1.5 2-1.5 2 0"/></svg>
                    <span class="meal-plan-badge" id="mealPlanBadge" style="display:none;">0</span>
                </button>
            </div>
            <div class="header-content">
                <div class="logo">
                    <h1>OnlyPans</h1>
                </div>
                <p class="subtitle">Reels to Ingredients</p>
            </div>
            <div class="header-actions">
                <button class="header-action-btn" id="addReelBtn" title="Add a reel">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
                </button>
                <button class="header-action-btn" id="cartToggle" title="Shopping List">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/></svg>
                    <span class="cart-badge" id="cartBadge" style="display:none;">0</span>
                </button>
            </div>
        </header>

        <!-- Spotlight-style convert overlay -->
        <div class="spotlight-overlay" id="spotlightOverlay">
            <div class="spotlight-bar" id="spotlightBar">
                <svg class="spotlight-icon" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5zm-5 5a2 2 0 012.828 0 1 1 0 101.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 105.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5a2 2 0 11-2.828-2.828l3-3z" clip-rule="evenodd"/>
                </svg>
                <input type="text" id="convertInput" placeholder="Paste a reel, TikTok, or recipe blog URL…" autocomplete="off" spellcheck="false">
                <div class="spotlight-right">
                    <span class="convert-spinner" id="convertSpinner" style="display:none;"></span>
                    <kbd class="spotlight-hint" id="spotlightHint">esc</kbd>
                </div>
            </div>
            <div class="spotlight-status" id="convertStatus" style="display:none;"></div>
        </div>

        <!-- Search -->
        <div class="search-container">
            <div class="glass-search">
                <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search recipes, creators, ingredients..." autocomplete="off">
                <button id="clearSearch" class="clear-btn" style="display:none;">
                    <svg viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                    </svg>
                </button>
            </div>
            <div class="filter-chips" id="filterChips"></div>
        </div>

        <!-- Today's Meal Plan Card (DoorDash-style) -->
        <div class="todays-meals-card" id="todaysMealsCard" style="display:none;">
            <div class="tm-header">
                <div class="tm-header-left">
                    <div class="tm-icon">🍽️</div>
                    <div class="tm-header-text">
                        <h3 class="tm-title">Today's Meals</h3>
                        <p class="tm-subtitle" id="tmSubtitle">Loading...</p>
                    </div>
                </div>
                <button class="tm-view-all" id="tmViewAll">View Plan →</button>
            </div>
            <div class="tm-meals" id="tmMealsList"></div>
        </div>

        <!-- Recipe Grid -->
        <main class="recipe-grid" id="recipeGrid"></main>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-glass">
                <svg viewBox="0 0 64 64" fill="none">
                    <rect x="8" y="12" width="48" height="40" rx="8" stroke="currentColor" stroke-width="2" opacity="0.4"/>
                    <path d="M20 28h24M20 36h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
                </svg>
                <p>No recipes found</p>
                <span>Try a different search or add recipes via the API</span>
            </div>
        </div>

        <!-- Recipe Detail Modal -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="glass-modal" id="recipeModal">
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                </button>
                <div class="modal-content" id="modalContent"></div>
            </div>
        </div>

        <!-- Shopping List Panel -->
        <div class="shopping-overlay" id="shoppingOverlay">
            <div class="glass-modal shopping-panel">
                <button class="modal-close" id="shoppingClose">
                    <svg viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                </button>
                <div id="shoppingContent"></div>
            </div>
        </div>

        <!-- Cook Mode Overlay -->
        <div class="cook-mode" id="cookMode">
            <div class="cook-mode-content" id="cookModeContent"></div>
        </div>

        <!-- Meal Plan Calendar Panel -->
        <div class="meal-plan-overlay" id="mealPlanOverlay">
            <div class="glass-modal meal-plan-panel">
                <div class="mp-top-actions">
                    <button class="mp-grocery-btn" id="groceryListBtn" title="Grocery List">
                        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/></svg>
                        <span>Grocery List</span>
                    </button>
                    <button class="mp-close-btn" id="mealPlanClose">
                        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                    </button>
                </div>
                <div class="meal-plan-header">
                    <h2 class="meal-plan-title">Meal Plan</h2>
                </div>
                <!-- Week Navigator -->
                <div class="week-nav">
                    <button class="week-arrow" id="mpPrevWeek">
                        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                    </button>
                    <span class="week-title" id="mpWeekTitle"></span>
                    <button class="week-arrow" id="mpNextWeek">
                        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
                    </button>
                </div>
                <!-- Day columns (kanban) -->
                <div class="mp-week-grid" id="mpWeekGrid"></div>
            </div>
        </div>

        <!-- Radial Day Picker (Zelda weapon wheel) -->
        <div class="radial-overlay" id="radialOverlay">
            <div class="radial-menu" id="radialMenu">
                <div class="radial-center">
                    <div class="radial-recipe-title" id="radialRecipeTitle"></div>
                    <div class="radial-week-label" id="radialWeekLabel"></div>
                </div>
                <div class="radial-ring" id="radialRing"></div>
                <div class="radial-week-nav">
                    <button class="radial-nav-btn" id="radialPrev">‹</button>
                    <button class="radial-nav-btn" id="radialNext">›</button>
                </div>
            </div>
        </div>

        <!-- Quick Add Sheet -->
        <div class="quick-add-overlay" id="quickAddOverlay">
            <div class="quick-add-sheet" id="quickAddSheet">
                <div class="quick-add-handle"></div>
                <div class="quick-add-header">
                    <span class="quick-add-day-label" id="quickAddDayLabel">Monday</span>
                    <button class="quick-add-close" id="quickAddClose">
                        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                    </button>
                </div>
                <div class="quick-add-input-row">
                    <span class="quick-add-emoji-btn" id="quickAddEmojiBtn">🍽️</span>
                    <input type="text" class="quick-add-input" id="quickAddInput" placeholder="Chipotle date night, leftovers..." maxlength="80" autocomplete="off" />
                </div>
                <div class="quick-add-vibe-tags" id="quickAddVibeTags">
                    <button class="vibe-tag" data-emoji="🥡" data-text="Takeout">🥡 Takeout</button>
                    <button class="vibe-tag" data-emoji="🍳" data-text="Leftovers">🍳 Leftovers</button>
                    <button class="vibe-tag" data-emoji="🎉" data-text="Date Night">🎉 Date Night</button>
                    <button class="vibe-tag" data-emoji="🤷" data-text="Wing It">🤷 Wing It</button>
                    <button class="vibe-tag" data-emoji="🥗" data-text="Meal Prep">🥗 Meal Prep</button>
                    <button class="vibe-tag" data-emoji="🍕" data-text="Pizza Night">🍕 Pizza Night</button>
                </div>
                <div class="quick-add-recent" id="quickAddRecent">
                    <div class="quick-add-recent-label">Recent</div>
                    <div class="quick-add-recent-pills" id="quickAddRecentPills"></div>
                </div>
                <button class="quick-add-submit" id="quickAddSubmit" disabled>
                    <span>Add to Plan</span>
                </button>
            </div>
        </div>

        <!-- Grocery List Modal -->
        <div class="grocery-overlay" id="groceryOverlay">
            <div class="glass-modal grocery-panel">
                <div class="grocery-header">
                    <h3>Grocery List</h3>
                    <button class="modal-close" id="groceryClose">
                        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                    </button>
                </div>
                <p class="grocery-subtitle" id="grocerySubtitle"></p>
                <div class="grocery-body" id="groceryBody"></div>
                <button class="grocery-copy-btn" id="groceryCopyBtn">Copy to Clipboard</button>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        {% if show_kofi %}
        <a href="https://ko-fi.com/M4M31KYZ9Y" target="_blank" rel="noopener noreferrer" class="kofi-link">
            <img src="https://storage.ko-fi.com/cdn/kofi6.png?v=6" alt="Buy me a coffee" height="24">
        </a>
        {% endif %}
    </footer>

    <script src="/static/app.js?v=17"></script>
    <script src="/static/meal-plan.js?v=6"></script>
</body>
</html>
