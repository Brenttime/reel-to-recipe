services:
  reel-cookbook-test:
    build: ./web
    container_name: reel-cookbook-test
    ports:
      - "5101:5100"
    volumes:
      - cookbook-data-test:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./scripts:/app/scripts:ro
    environment:
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-test}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-test}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-http://localhost:5101/auth/callback}
      - SECRET_KEY=${SECRET_KEY:-onlypans-test-secret}
      - SHOW_KOFI=${SHOW_KOFI:-true}
      - TEST_MODE=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  cookbook-data-test:
