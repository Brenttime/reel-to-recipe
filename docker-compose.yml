services:
  reel-cookbook:
    build: ./web
    container_name: reel-cookbook
    ports:
      - "5100:5100"
    volumes:
      - cookbook-data:/data
    environment:
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-http://YOUR_HOST_IP:5100/auth/callback}
      - SECRET_KEY=${SECRET_KEY:-onlypans-change-me-in-prod}
      - SHOW_KOFI=${SHOW_KOFI:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  cookbook-data:
