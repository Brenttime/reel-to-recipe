services:
  reel-cookbook:
    build: ./web
    container_name: reel-cookbook
    ports:
      - "5100:5100"
    volumes:
      - cookbook-data:/data
    environment:
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-1513301068111548527}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-http://192.168.4.37:5100/auth/callback}
      - SECRET_KEY=${SECRET_KEY:-onlypans-change-me-in-prod}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  cookbook-data:
