services:
  reel-cookbook:
    build: ./web
    container_name: reel-cookbook
    ports:
      - "5100:5100"
    volumes:
      - cookbook-data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:?Set DISCORD_CLIENT_ID in .env}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:?Set DISCORD_CLIENT_SECRET in .env}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:?Set DISCORD_REDIRECT_URI in .env}
      - SECRET_KEY=${SECRET_KEY:-onlypans-change-me-in-prod}
      - SHOW_KOFI=${SHOW_KOFI:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: onlypans-mcp
    ports:
      - "8001:8001"
      - "8002:8002"
    volumes:
      - cookbook-data:/data
      - ./cookies.txt:/app/cookies.txt:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - RECIPE_GLASS_URL=http://reel-cookbook:5100
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
    depends_on:
      - reel-cookbook
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  cookbook-data:
