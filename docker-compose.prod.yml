# Production override — adds Caddy for automatic HTTPS
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required in .env:
#   DOMAIN=onlypans.example.com
#   DISCORD_REDIRECT_URI=https://onlypans.example.com/auth/callback
#   HTTPS_ENABLED=true

services:
  reel-cookbook:
    # Override: bind only to localhost so Caddy handles public traffic
    ports:
      - "127.0.0.1:5100:5100"
    environment:
      - HTTPS_ENABLED=true

  caddy:
    image: caddy:2-alpine
    container_name: onlypans-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:?Set DOMAIN in .env (e.g. onlypans.example.com)}
    depends_on:
      - reel-cookbook

volumes:
  caddy-data:
  caddy-config:
